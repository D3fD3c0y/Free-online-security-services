name: Notify Online Security Tools Framework

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch source update to framework repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.FRAMEWORK_REPO_PAT }}
          repository: D3fD3c0y/Online-security-tools-framework
          event-type: source-updated
          client-payload: >-
            {
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref_name }}",
              "source_sha": "${{ github.sha }}"
            }
